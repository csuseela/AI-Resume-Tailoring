services:
  - type: web
    name: ai-resume-tailoring
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: JOB_SOURCE_PROVIDER
        value: startups
      - key: RESUME_SOURCE
        value: local
      - key: EMAIL_ENABLED
        value: "false"
      - key: SCHEDULE_TIMEZONE
        value: America/New_York
